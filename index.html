<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN ULTIMATE | Professional Valuation & Benchmark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --accent: #a855f7; }
        body { 
            background: #020205; color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }
        /* Animated Background Mesh */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.1) 0%, transparent 35%);
        }
        .glass { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 14px; border-radius: 16px; width: 100%; outline: none;
        }
        .input-glass:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }
        .price-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-main { background: white; color: black; font-weight: 800; transition: 0.3s; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        .mode-tab { cursor: pointer; padding: 10px 20px; border-radius: 12px; transition: 0.3s; color: #666; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .mode-tab.active { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-20">
    <div class="mesh-bg"></div>

    <nav class="w-full max-w-6xl mx-auto p-8 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter uppercase italic">Titan <span class="text-green-500">Ultimate</span></div>
        <div class="flex glass p-1 gap-2">
            <div onclick="setMode('phone')" id="tab-phone" class="mode-tab active">Smartphone</div>
            <div onclick="setMode('pc')" id="tab-pc" class="mode-tab">PC/Workstation</div>
        </div>
    </nav>

    <main class="w-full max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-10 mt-6">
        
        <!-- Section 1: Selection -->
        <div class="lg:col-span-5 space-y-6">
            <div class="glass p-8">
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-8">Hardware Configuration</h2>
                
                <div id="phone-fields" class="space-y-6">
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Brand</label>
                        <select id="phone-brand" class="input-glass" onchange="loadModels()">
                            <option value="Apple">Apple iPhone</option>
                            <option value="Samsung">Samsung Galaxy</option>
                            <option value="Google">Google Pixel</option>
                            <option value="Xiaomi">Xiaomi / Poco</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Model</label>
                        <select id="phone-model" class="input-glass"></select>
                    </div>
                </div>

                <div id="pc-fields" class="space-y-6 hidden">
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Processor (CPU)</label>
                        <select id="pc-cpu" class="input-glass"></select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Graphics (GPU)</label>
                        <select id="pc-gpu" class="input-glass"></select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Memory (RAM GB)</label>
                        <input type="number" id="pc-ram" value="16" class="input-glass">
                    </div>
                </div>

                <div class="pt-4">
                    <label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block">Physical State</label>
                    <select id="condition" class="input-glass">
                        <option value="1">Like New / Sealed</option>
                        <option value="0.9">Excellent (Minor marks)</option>
                        <option value="0.75">Good (Visible scratches)</option>
                        <option value="0.5">Heavy Use / Cracked</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Section 2: Analysis & Value -->
        <div class="lg:col-span-7 space-y-8 text-center">
            <div class="glass p-12 relative overflow-hidden group">
                <div class="absolute -top-20 -right-20 w-40 h-40 bg-green-500/10 blur-[80px]"></div>
                
                <div class="mb-4 text-[10px] text-gray-500 uppercase tracking-widest font-bold">Hardware Integrity Index</div>
                <div id="score-val" class="text-9xl font-black font-mono tracking-tighter score-number mb-8">0</div>
                
                <button onclick="runAdvancedAudit()" id="run-btn" class="btn-main w-full py-6 rounded-2xl text-lg uppercase tracking-widest">Run AI Diagnostic</button>
                <div id="status-msg" class="mt-4 text-[10px] text-gray-600 font-bold uppercase tracking-widest">Awaiting Stress Test...</div>
            </div>

            <div class="glass p-10 flex flex-col items-center justify-center min-h-[220px]">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em] mb-4">Estimated Resale Market Value</p>
                <div id="price-val" class="price-text text-7xl font-black tracking-tighter">$0</div>
                <div class="mt-4 text-[9px] text-gray-600 uppercase font-bold tracking-widest" id="val-id">ID: TITAN-GEN-000</div>
            </div>
        </div>
    </main>

    <script>
        // --- Massive Database ---
        const DB = {
            phones: {
                Apple: {
                    "iPhone 15 Pro Max": 1200, "iPhone 15 Pro": 1000, "iPhone 15 Plus": 900, "iPhone 15": 800,
                    "iPhone 14 Pro Max": 900, "iPhone 14 Pro": 800, "iPhone 14": 650,
                    "iPhone 13 Pro Max": 750, "iPhone 13 Pro": 650, "iPhone 13": 500,
                    "iPhone 12 Pro Max": 600, "iPhone 12": 400, "iPhone 11 Pro": 350,
                    "iPhone 11": 280, "iPhone XS Max": 220, "iPhone X": 180, "iPhone 8 Plus": 130
                },
                Samsung: {
                    "S24 Ultra": 1150, "S24+": 950, "S24": 800, "S23 Ultra": 850, "S23+": 650, 
                    "S22 Ultra": 550, "S21 Ultra": 400, "S20 Ultra": 300, "Fold 5": 1100, "Flip 5": 600
                },
                Google: { "Pixel 8 Pro": 850, "Pixel 8": 600, "Pixel 7 Pro": 450, "Pixel 6": 250 },
                Xiaomi: { "Xiaomi 14 Ultra": 1000, "Xiaomi 13T Pro": 550, "Poco F5": 300, "Poco X6 Pro": 280 }
            },
            cpus: {
                "Intel i9-14900K": 580, "Intel i7-14700K": 400, "Intel i5-14600K": 310,
                "Intel i9-13900K": 450, "Intel i7-12700K": 280, "Intel i5-10400F": 100,
                "AMD Ryzen 9 7950X": 520, "AMD Ryzen 7 7800X3D": 390, "AMD Ryzen 5 7600": 210,
                "AMD Ryzen 9 5900X": 300, "AMD Ryzen 5 3600": 80
            },
            gpus: {
                "RTX 4090": 1900, "RTX 4080 Super": 1100, "RTX 4070 Ti": 800, "RTX 4060": 300,
                "RTX 3090": 800, "RTX 3080": 550, "RTX 3060 Ti": 320, "RTX 2060": 180,
                "GTX 1660 Super": 130, "GTX 1080 Ti": 180, "GTX 1050 Ti": 70,
                "RX 7900 XTX": 950, "RX 6800 XT": 450, "RX 580 8GB": 70
            }
        };

        let currentMode = 'phone';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('phone-fields').style.display = (mode === 'phone') ? 'block' : 'none';
            document.getElementById('pc-fields').style.display = (mode === 'pc') ? 'block' : 'none';
            loadModels();
        }

        function loadModels() {
            if (currentMode === 'phone') {
                const brand = document.getElementById('phone-brand').value;
                const select = document.getElementById('phone-model');
                select.innerHTML = "";
                Object.keys(DB.phones[brand]).forEach(m => select.innerHTML += `<option value="${m}">${m}</option>`);
            } else {
                const cpuSelect = document.getElementById('pc-cpu');
                const gpuSelect = document.getElementById('pc-gpu');
                if (cpuSelect.innerHTML === "") {
                    Object.keys(DB.cpus).forEach(c => cpuSelect.innerHTML += `<option value="${c}">${c}</option>`);
                    Object.keys(DB.gpus).forEach(g => gpuSelect.innerHTML += `<option value="${g}">${g}</option>`);
                }
            }
        }

        loadModels();

        // --- Hardware Engine (The Benchmark) ---
        const auditWorker = new Blob([`
            self.onmessage = function() {
                let s = performance.now();
                let x = 0;
                for(let i=0; i<80000000; i++) { x += Math.sqrt(i) * Math.log(i); }
                self.postMessage(performance.now() - s);
            }
        `], {type: 'application/javascript'});

        function runAdvancedAudit() {
            const btn = document.getElementById('run-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; btn.style.opacity = 0.3;
            status.innerText = "Engaging all CPU threads...";
            
            const w = new Worker(URL.createObjectURL(auditWorker));
            w.postMessage('go');
            
            w.onmessage = function(e) {
                const score = Math.floor(1500000 / e.data);
                animateScore(score);
                w.terminate();
                btn.disabled = false; btn.style.opacity = 1;
                status.innerText = "Audit Complete. Market Valuation Synced.";
            };
        }

        function animateScore(target) {
            gsap.to({v:0}, {
                v: target, duration: 2, ease: "power4.out",
                onUpdate: function() { document.getElementById('score-val').innerText = Math.floor(this.targets()[0].v); },
                onComplete: () => calcValue(target)
            });
        }

        function calcValue(score) {
            let base = 0;
            const cond = parseFloat(document.getElementById('condition').value);

            if (currentMode === 'phone') {
                const brand = document.getElementById('phone-brand').value;
                const model = document.getElementById('phone-model').value;
                base = DB.phones[brand][model];
            } else {
                const cpu = document.getElementById('pc-cpu').value;
                const gpu = document.getElementById('pc-gpu').value;
                const ram = parseInt(document.getElementById('pc-ram').value);
                base = DB.cpus[cpu] + DB.gpus[gpu] + (ram * 5) + 100; // 100 base for case/psu
            }

            // Health Multiplier: Normal score around 2500. 
            // Older/weaker devices get lower scores, reducing value.
            let health = Math.min(score / 2500, 1.15);
            let final = base * cond * health;

            gsap.to({v:0}, {
                v: final, duration: 1.5,
                onUpdate: function() { document.getElementById('price-val').innerText = "$" + Math.floor(this.targets()[0].v).toLocaleString(); }
            });
            document.getElementById('val-id').innerText = "ID: TITAN-" + Math.floor(1000 + Math.random() * 9000);
        }
    </script>
</body>
</html>
