        body { background: #010103; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .cyber-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.12) 0%, transparent 45%), radial-gradient(circle at 90% 90%, rgba(34, 197, 94, 0.1) 0%, transparent 45%); }

        .input-glass { background: #08080c !important; border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff !important; padding: 12px; border-radius: 15px; width: 100%; outline: none; font-size: 11px; appearance: none; cursor: pointer; }
        select option { background-color: #08080c; color: white; }
        .price-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 25px rgba(34, 197, 94, 0.5)); }
        .nav-tab { cursor: pointer; padding: 12px 18px; border-radius: 18px; transition: 0.4s; color: #444; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .nav-tab.active { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15); }
        .titan-btn { background: white; color: black; font-weight: 900; transition: 0.4s; }
        .titan-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 40px rgba(255,255,255,0.2); }

        let currentMode = 'phone';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            initSelections();
            gsap.from(".glass", { opacity: 0, y: 20, duration: 0.5 });
        }

        function initSelections() {
            const brandSel = document.getElementById('brand-select');
            brandSel.innerHTML = "";
            Object.keys(DB[currentMode]).forEach(b => {
                brandSel.innerHTML += `<option value="${b}">${b.replace(/_/g, ' ')}</option>`;
            });
            updateSub1();
        }

        function updateSub1() {
            const brand = document.getElementById('brand-select').value;
            const sub1Sel = document.getElementById('sub1-select');
            sub1Sel.innerHTML = "";
            Object.keys(DB[currentMode][brand]).forEach(s => {
                sub1Sel.innerHTML += `<option value="${s}">${s}</option>`;
            });
            updateSub2();
        }

        function updateSub2() {
            const brand = document.getElementById('brand-select').value;
            const sub1 = document.getElementById('sub1-select').value;
            const sub2Sel = document.getElementById('sub2-select');
            sub2Sel.innerHTML = "";
            Object.keys(DB[currentMode][brand][sub1]).forEach(m => {
                sub2Sel.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }

        const workerBlob = new Blob([`
            self.onmessage = function() {
                let start = performance.now();
                for(let i=0; i<120000000; i++) { Math.sqrt(i) * Math.log(i+1); }
                self.postMessage(performance.now() - start);
            }
        `], {type: 'application/javascript'});

        function runAudit() {
            const btn = document.getElementById('run-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; btn.style.opacity = 0.3;
            status.innerText = "Stressing Architecture (120M Chronos Ops)...";
            
            const w = new Worker(URL.createObjectURL(workerBlob));
            w.postMessage('go');
            
            w.onmessage = function(e) {
                const score = Math.floor(4000000 / e.data);
                gsap.to({v:0}, {
                    v: score, duration: 3, ease: "power4.out",
                    onUpdate: function() { document.getElementById('score-val').innerText = Math.floor(this.targets()[0].v).toLocaleString(); },
                    onComplete: () => { finalize(score); w.terminate(); btn.disabled = false; btn.style.opacity = 1; }
                });
            };
        }

        function finalize(score) {
            const brand = document.getElementById('brand-select').value;
            const sub1 = document.getElementById('sub1-select').value;
            const sub2 = document.getElementById('sub2-select').value;
            const cond = parseFloat(document.getElementById('condition').value);
            
            let base = DB[currentMode][brand][sub1][sub2];
            let health = Math.min(score / 5000, 1.15);
            let final = base * cond * health;

            gsap.to({v:0}, {
                v: final, duration: 2,
                onUpdate: function() { document.getElementById('price-val').innerText = "$" + Math.floor(final < 15 ? 15 : final).toLocaleString(); }
            });
            document.getElementById('val-id').innerText = "TITAN-V8-FINAL-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        }
