<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN v6.0 | Ultimate Hardware Valuation 2015-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --accent: #a855f7; }
        body { background: #010102; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.12) 0%, transparent 40%);
        }

        .glass { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
        }

        .input-glass {
            background: #08080c !important; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff !important;
            padding: 15px;
            border-radius: 18px;
            width: 100%;
            outline: none;
            font-size: 14px;
            appearance: none;
        }
        
        select option { background-color: #08080c; color: white; padding: 10px; }

        .price-text { 
            font-family: 'Orbitron', sans-serif; 
            background: linear-gradient(to bottom, #fff, var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.3));
        }

        .mode-tab { cursor: pointer; padding: 14px 24px; border-radius: 18px; transition: 0.4s; color: #444; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .mode-tab.active { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        
        .titan-btn { 
            background: white; color: black; font-weight: 900; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .titan-btn:hover { transform: scale(1.02) translateY(-3px); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="pb-20">
    <div class="mesh-bg"></div>

    <!-- Navigation -->
    <nav class="w-full max-w-6xl mx-auto p-10 flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="text-4xl font-black tracking-tighter uppercase italic">Titan <span class="text-green-500">v6.0</span></div>
        <div class="flex glass p-1.5 gap-1.5">
            <div onclick="setMode('phone')" id="tab-phone" class="mode-tab active">Smartphones</div>
            <div onclick="setMode('laptop')" id="tab-laptop" class="mode-tab">Laptops</div>
            <div onclick="setMode('pc')" id="tab-pc" class="mode-tab">Desktop PC</div>
        </div>
    </nav>

    <main class="w-full max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-12 mt-4">
        
        <!-- Selection Sidebar -->
        <div class="lg:col-span-5 space-y-8">
            <div class="glass p-10 shadow-2xl">
                <h2 id="config-title" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.5em] mb-10 italic">Hardware DNA Selection</h2>
                
                <div id="phone-fields" class="space-y-6">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Brand Ecosystem</label>
                        <select id="phone-brand" class="input-glass" onchange="loadModels()">
                            <option value="Apple">Apple iPhone</option>
                            <option value="Samsung">Samsung Galaxy</option>
                            <option value="Honor">Honor</option>
                            <option value="Infinix">Infinix</option>
                            <option value="Huawei">Huawei</option>
                            <option value="Xiaomi">Xiaomi / Poco</option>
                            <option value="Google">Google Pixel</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Model (2015-2026)</label>
                        <select id="phone-model" class="input-glass"></select>
                    </div>
                </div>

                <div id="laptop-fields" class="space-y-6 hidden">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Manufacturer</label>
                        <select id="laptop-brand" class="input-glass" onchange="loadModels()">
                            <option value="AppleMac">Apple MacBook (M1-M4)</option>
                            <option value="Dell">Dell / Alienware</option>
                            <option value="HP">HP Omen / Victus</option>
                            <option value="Asus">Asus ROG / TUF</option>
                            <option value="Lenovo">Lenovo Legion</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Processor Architecture</label>
                        <select id="laptop-cpu" class="input-glass"></select>
                    </div>
                </div>

                <div id="pc-fields" class="space-y-6 hidden">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Desktop Processor (CPU)</label>
                        <select id="pc-cpu" class="input-glass"></select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Graphics Card (GPU)</label>
                        <select id="pc-gpu" class="input-glass"></select>
                    </div>
                </div>

                <div class="pt-8 border-t border-white/10 mt-8">
                    <label class="text-[10px] text-gray-500 uppercase font-black mb-3 block tracking-widest">Physical & Battery Health</label>
                    <select id="condition" class="input-glass">
                        <option value="1">100% Brand New / Sealed</option>
                        <option value="0.9">Excellent (Mint Condition)</option>
                        <option value="0.75">Good (Normal Wear)</option>
                        <option value="0.5">Heavy Use / Cracked</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Result Sidebar -->
        <div class="lg:col-span-7 space-y-10 text-center">
            <div class="glass p-12 relative overflow-hidden group">
                <div class="mb-4 text-[10px] text-gray-500 uppercase tracking-widest font-black">Benchmark Power Index</div>
                <div id="score-val" class="text-9xl font-black font-mono tracking-tighter mb-10">0</div>
                <button onclick="runAudit()" id="run-btn" class="titan-btn w-full py-7 rounded-3xl text-xl uppercase tracking-[0.2em]">Run Deep Scan Analysis</button>
                <div id="status-msg" class="mt-6 text-[10px] text-gray-600 font-bold uppercase tracking-widest italic">Awaiting Stress Test v6.0</div>
            </div>

            <div class="glass p-12 min-h-[300px] flex flex-col items-center justify-center relative shadow-inner">
                <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.5em] mb-6">Market Fair Value</p>
                <div id="price-val" class="price-text text-8xl md:text-9xl font-black tracking-tighter">$0</div>
                <div class="mt-10 text-[9px] text-gray-400 uppercase font-black tracking-widest border border-white/10 px-8 py-3 rounded-full" id="val-id">TITAN-DATABASE-CONNECTED</div>
            </div>
        </div>
    </main>

    <script>
        // --- THE MASSIVE 2015-2026 DATABASE ---
        const DB = {
            phones: {
                Apple: { 
                    "iPhone 17 Pro Max (2026)": 1450, "iPhone 16 Pro Max": 1250, "iPhone 15 Pro Max": 1050, 
                    "iPhone 14 Pro Max": 850, "iPhone 13 Pro Max": 700, "iPhone 12 Pro Max": 500,
                    "iPhone 11 Pro Max": 380, "iPhone XS Max": 240, "iPhone X": 180, "iPhone 8 Plus": 120, "iPhone 6s (2015)": 50
                },
                Samsung: { 
                    "S26 Ultra (2026)": 1350, "S25 Ultra": 1150, "S24 Ultra": 1000, "S23 Ultra": 800, 
                    "S22 Ultra": 550, "S21 Ultra": 400, "S20 Ultra": 280, "S10 Plus": 150, "S8 Plus": 80, "S6 Edge (2015)": 40 
                },
                Honor: { "Magic 7 Pro (2026)": 1100, "Magic 6 Pro": 900, "Honor 200 Pro": 550, "Honor 90": 320, "Honor 8 (2016)": 50 },
                Infinix: { "Zero 40 (2026)": 450, "GT 20 Pro": 350, "Note 40 VIP": 300, "Hot 40 Pro": 170 },
                Xiaomi: { "16 Ultra (2026)": 1200, "15 Ultra": 1000, "14 Ultra": 850, "13 Ultra": 650, "Redmi Note 13": 250, "Mi 5 (2016)": 40 }
            },
            laptops: {
                AppleMac: { "M4 Max Chip (2025/26)": 3500, "M3 Max Chip": 2800, "M2 Max Chip": 2100, "M1 Max Chip": 1500, "M1 Air (2020)": 650 },
                Dell: { "i9-15900HX (2026)": 3800, "i9-14900HX": 2900, "i9-13980HX": 2200, "i7-12700H": 1300, "i7-6700HQ (2015)": 300 },
                Asus: { "ROG Strix SCAR RTX 5090 (2026)": 4500, "ROG M16 RTX 4090": 3200, "TUF Dash i7": 1100, "ROG G752 (2015)": 350 }
            },
            cpus: {
                "Intel i9-15900K (2026)": 650, "Intel i9-14900K": 550, "Intel i9-13900K": 450, "Intel i9-12900K": 350, "Intel i7-10700K": 180, "Intel i7-6700K (2015)": 80,
                "AMD Ryzen 9 9950X (2025/26)": 650, "AMD Ryzen 9 7950X3D": 550, "AMD Ryzen 7 7800X3D": 450, "AMD Ryzen 9 5950X": 350, "AMD Ryzen 5 1600 (2017)": 40
            },
            gpus: {
                "RTX 5090 (2026)": 2200, "RTX 5080": 1300, "RTX 4090": 1900, "RTX 4080 Super": 1100, "RTX 3090 Ti": 850, "RTX 3060 12GB": 280, "RTX 2080 Ti": 350, "GTX 1080 Ti": 200, "GTX 980 Ti (2015)": 80,
                "Intel Arc B580 (Battlemage 2025)": 400, "Intel Arc A770": 280, "Intel Arc A380": 120,
                "RX 8900 XTX (2026)": 1100, "RX 7900 XTX": 900, "RX 6800 XT": 450, "RX 580 8GB": 90, "R9 Fury X (2015)": 70
            }
        };

        let currentMode = 'phone';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('phone-fields').classList.toggle('hidden', mode !== 'phone');
            document.getElementById('laptop-fields').classList.toggle('hidden', mode !== 'laptop');
            document.getElementById('pc-fields').classList.toggle('hidden', mode !== 'pc');
            loadModels();
        }

        function loadModels() {
            const selects = {
                phone: ['phone-brand', 'phone-model', DB.phones],
                laptop: ['laptop-brand', 'laptop-cpu', DB.laptops],
                pc: ['pc-cpu', 'pc-gpu', DB]
            };

            const [brandId, modelId, dataSource] = selects[currentMode];
            const brand = document.getElementById(brandId).value;
            const modelSelect = document.getElementById(modelId);
            
            if (currentMode === 'pc') {
                const cpuSelect = document.getElementById('pc-cpu');
                const gpuSelect = document.getElementById('pc-gpu');
                if (cpuSelect.innerHTML === "") {
                    Object.keys(DB.cpus).forEach(c => cpuSelect.innerHTML += `<option value="${c}">${c}</option>`);
                    Object.keys(DB.gpus).forEach(g => gpuSelect.innerHTML += `<option value="${g}">${g}</option>`);
                }
            } else {
                modelSelect.innerHTML = "";
                Object.keys(dataSource[brand]).forEach(m => modelSelect.innerHTML += `<option value="${m}">${m}</option>`);
            }
        }

        loadModels();

        // --- TITAN CORE ENGINE v6.0 (120M Operations) ---
        const workerBlob = new Blob([`
            self.onmessage = function() {
                let start = performance.now();
                let x = 0;
                for(let i=0; i<120000000; i++) { x += Math.sqrt(i) * Math.log(i + 1); }
                self.postMessage(performance.now() - start);
            }
        `], {type: 'application/javascript'});

        function runAudit() {
            const btn = document.getElementById('run-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; btn.style.opacity = 0.3;
            status.innerText = "Stressing Architecture (120M High-Precision Ops)...";
            
            const w = new Worker(URL.createObjectURL(workerBlob));
            w.postMessage('go');
            
            w.onmessage = function(e) {
                const score = Math.floor(3000000 / e.data);
                animateScore(score);
                w.terminate();
                btn.disabled = false; btn.style.opacity = 1;
                status.innerText = "Quantum-Level Audit Complete.";
            };
        }

        function animateScore(target) {
            gsap.to({v:0}, {
                v: target, duration: 3, ease: "power4.out",
                onUpdate: function() { document.getElementById('score-val').innerText = Math.floor(this.targets()[0].v).toLocaleString(); },
                onComplete: () => calcValue(target)
            });
        }

        function calcValue(score) {
            let base = 0;
            const cond = parseFloat(document.getElementById('condition').value);
            
            if (currentMode === 'phone') {
                base = DB.phones[document.getElementById('phone-brand').value][document.getElementById('phone-model').value];
            } else if (currentMode === 'laptop') {
                base = DB.laptops[document.getElementById('laptop-brand').value][document.getElementById('laptop-cpu').value];
            } else {
                base = DB.cpus[document.getElementById('pc-cpu').value] + DB.gpus[document.getElementById('pc-gpu').value] + 180;
            }

            // Valuation Multiplier (Health check) - Standard score for 2026 high-end is 4500+
            let healthFactor = Math.min(score / 4000, 1.15);
            let final = base * cond * healthFactor;

            gsap.to({v:0}, {
                v: final, duration: 2,
                onUpdate: function() { document.getElementById('price-val').innerText = "$" + Math.floor(this.targets()[0].v).toLocaleString(); }
            });
            document.getElementById('val-id').innerText = "TITAN-V6-SECURE: " + Math.random().toString(36).substr(2, 10).toUpperCase();
        }
    </script>
</body>
</html>
